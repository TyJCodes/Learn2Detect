<!DOCTYPE html>
<html>
    <header>
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
        <link rel="stylesheet" href="styles.css">
        <title>Login</title>
    </header>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
    <script src="ui-loader/ui-loader.js"></script>
    <body>
        <div id="navbar-placeholder"></div>
        <div class="container d-flex justify-content-center align-items-center vh-100">
            <div class="card shadow-lg border-0 rounded-4" style="max-width: 400px;">
                <div class="card-body p-5">
                    <div class="text-center mb-4">
                        <h2 class="fw-bold">Login to your <span class="text-primary">Learn</span>2Detect account!</h2>
                    </div>

                    <form id="loginForm">
                        <div class="form-floating mb-3">
                            <input type="text" class="form-control" id="username" placeholder="Username" required>
                            <label for="username">Username</label>
                        </div>

                        <div class="form-floating mb-3">
                            <input type="password" class="form-control" id="password" placeholder="Password" required>
                            <label for="password">Password</label>
                        </div>

                        <button type="submit" class="btn btn-primary w-100 py-3 rounded-pill shadow-sm" id="loginButton">Login</button>
                    </form>

                    <div class="text-center">
                        <p id="statusMessage" class="small text-danger"></p>
                        <p class="small text-muted">Don't have an account? <a href="signup.html" class="text-decoration-none fw-bold">Sign up here!</a></p>
                    </div>
                </div>
            </div>
        </div>
        <div id="footer-placeholder"></div>
    </body>
</html>
<script>
    document.getElementById('loginForm').addEventListener('submit', async (err) => 
    {
        err.preventDefault(); // Stops the page from reloading

        const username = document.getElementById('username').value;
        const password = document.getElementById('password').value;
        const statusMessage = document.getElementById('statusMessage');

        const response = await fetch('/api/login', 
        {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ username, password })
        });

        const data = await response.json();

        if(response.ok)
        {
            localStorage.setItem('currentUser', JSON.stringify(data.user));
            window.location.href = 'phishing.html';
        }
        else
        {
            statusMessage.style.color = "red";
            statusMessage.innerText = data.error;
        }
    });
</script>
