<!DOCTYPE html>
<html>
    <header>
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
        <link rel="stylesheet" href="styles.css">
        <title>Create Account</title>
    </header>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
    <script src="ui-loader/ui-loader.js"></script>
    <body>
        <div id="navbar-placeholder"></div>
        <div class="container d-flex justify-content-center align-items-center vh-100">
            <div class="card shadow-lg border-0 rounded-4" style="max-width: 400px;">
                <div class="card-body p-5">
                    <div class="text-center mb-4">
                        <h2 class="fw-bold">Create a <span class="text-primary">Learn</span>2Detect account!</h2>
                        <p> and start your cyber security journey now!</p>
                    </div>

                    <form id="signupForm">
                        <div class="form-floating mb-3">
                            <input type="text" class="form-control" id="username" placeholder="Username" required>
                            <label for="username">Username</label>
                        </div>

                        <div class="form-floating mb-3">
                            <input type="text" class="form-control" id="email" placeholder="Email" required>
                            <label for="email">Email</label>
                        </div>

                        <div class="form-floating mb-3">
                            <input type="password" class="form-control" id="password" placeholder="Password" required>
                            <label for="password">Password</label>
                        </div>

                        <button type="submit" class="btn btn-primary w-100 py-3 rounded-pill shadow-sm" id="signupButton">Create Account</button>
                    </form>

                    <div class="text-center">
                        <p id="statusMessage" class="small text-danger"></p>
                        <p class="small text-muted">Don't have an account? <a href="signup.html" class="text-decoration-none fw-bold">Log in here!</a></p>
                    </div>
                </div>
            </div>
        </div>
    </body>
    <div id="footer-placeholder"></div>
</html>
<script>
document.getElementById('signupForm').addEventListener('submit', async (e) => 
    {
        e.preventDefault(); // Stops the page from reloading

        const username = document.getElementById('username').value;
        const email = document.getElementById('email').value;
        const password = document.getElementById('password').value;
        const statusDisplay = document.getElementById('statusMessage');

        try
        {
            const response = await fetch('/api/signup', 
            {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username, email, password })
            });

            const data = await response.json();

            if(response.ok)
            {
                statusDisplay.style.color="green";
                statusDisplay.innerText="Success! Rediricting to the login page...";
                window.location.href = 'login.html';
            }
            else
            {
                statusDisplay.style.color = "red";
                statusDisplay.innerText = data.error;
            }
        }
        catch (error)
        {
            statusDisplay.innerText = "Error, couldnt connect to the server"
        }
    });
</script>
